      function render_the_banners(banner_objs) {
          const wrapper = document.getElementById("collapsible-banner-wrapper");
          const headlessWrapper = document.getElementById("top-banner-headless-wrapper");
          if (!wrapper) return;

          if (localStorage.getItem("bannercard-switch") === 'true') {
              wrapper.style.display = '';
              if (headlessWrapper) headlessWrapper.style.display = '';
              $("#top-banner-container").empty();
              $("#top-banner-container").append("<div class='MessageInfo'>    1/1 (max-height: 300px) </div><img src='./rs/wireframe_banners2_1250x313.png' style='width:100%'>");

              $("#top-banner-headless-container").empty();
              $("#top-banner-headless-container").append("<div class='MessageInfo'>    1/1 headless (max-height: 300px) </div><img src='./rs/wireframe_banners2_1250x313.png' style='width:100%'>");

              // get this placement's banner. If it's `null` the user did not qualify for one.
              const topBanner = banner_objs["top_banner"];
              if (topBanner) {
                // Standard render: insertBanner
                const standardContainer = document.getElementById("top-banner-container");
                braze.insertBanner(topBanner, standardContainer);
                if (topBanner.isControl) {
                  standardContainer.style.display = 'none';
                }

                // Headless render: tile-style (image + h4 + description) inside a full-width banner box.
                // Supports string/image properties and optional JSON property (getJsonProperty); JSON can override or add content.
                const headlessContainer = document.getElementById("top-banner-headless-container");
                if (!topBanner.isControl) {
                  let imgUrl = topBanner.getImageProperty && topBanner.getImageProperty("image");
                  let title = (topBanner.getStringProperty && topBanner.getStringProperty("title")) || "";
                  let description = (topBanner.getStringProperty && topBanner.getStringProperty("description")) || "";
                  let url = (topBanner.getStringProperty && topBanner.getStringProperty("url")) || "";
                  // If a property is sent as JSON, read it with getJsonProperty (key must match your Braze banner template).
                  const jsonData = topBanner.getJsonProperty && topBanner.getJsonProperty("data");
                  let jsonBlock = "";
                  if (jsonData != null && typeof jsonData === "object") {
                    if (jsonData.title != null) title = String(jsonData.title);
                    if (jsonData.description != null) description = String(jsonData.description);
                    if (jsonData.url != null) url = String(jsonData.url);
                    if (jsonData.image != null) imgUrl = String(jsonData.image);
                    if (jsonData.html != null && typeof jsonData.html === "string") {
                      jsonBlock = "<div class='headless-banner-json-html' style='flex:1; padding:16px 20px;'>" + jsonData.html + "</div>";
                    } else if (jsonData.body != null) {
                      jsonBlock = "<div style='flex:1; padding:16px 20px; color:#333;'>" + escapeHtml(String(jsonData.body)) + "</div>";
                    } else if (Object.keys(jsonData).length > 0 && !imgUrl && title === "" && description === "") {
                      jsonBlock = "<pre style='flex:1; padding:16px 20px; margin:0; font-size:12px; overflow:auto;'>" + escapeHtml(JSON.stringify(jsonData, null, 2)) + "</pre>";
                    }
                  }
                  const imgBlock = (imgUrl) ? "<div style='flex:0 0 auto; max-width:40%; max-height:300px; overflow:hidden;'><img class='img-fluid' src='" + escapeHtml(imgUrl) + "' style='width:auto; height:100%; max-height:300px; object-fit:cover; display:block;'></div>" : "";
                  const contentBlock = jsonBlock || ("<div style='flex:1; padding:16px 20px; display:flex; flex-direction:column; justify-content:center;'>" +
                    (title !== "" ? "<h4 style='margin:0 0 8px 0;'>" + escapeHtml(title) + "</h4>" : "") +
                    (description !== "" ? "<p style='margin:0; color:#333;'>" + escapeHtml(description) + "</p>" : "") +
                    "</div>");
                  const inner = imgBlock + contentBlock;
                  $("#top-banner-headless-container").empty();
                  $("#top-banner-headless-container").append(url ? "<a href=\"" + escapeHtml(url) + "\" style='display:flex; width:100%; text-decoration:none; color:inherit;'>" + inner + "</a>" : "<div style='display:flex; width:100%;'>" + inner + "</div>");
                  braze.logBannerImpressions([topBanner]);
                  $("#top-banner-headless-container").off("click.bannerHeadless").on("click.bannerHeadless", function () { braze.logBannerClick(topBanner); });
                } else {
                  headlessContainer.style.display = 'none';
                }
              }
          }
          else {
            wrapper.style.display = 'none';
            if (headlessWrapper) headlessWrapper.style.display = 'none';
            $("#top-banner-container").empty();
            $("#top-banner-headless-container").empty();
          }
      }

      function plusSlides(n) {
        SlideShow(slidePosition);
      }
  
      function minusSlides(n) {
        SlideShow(slidePosition - 1);
      }
  
      //  images controls
      function currentSlide(n) {
        SlideShow(slidePosition = n);
      }
  
      function SlideShow(n) {
        var i;
        var slides = document.getElementsByClassName("Containers");
        //var circles = document.getElementsByClassName("dots");
        if (n > slides.length) { slidePosition = 1 }
        if (n < 1) { slidePosition = slides.length }
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        //for (i = 0; i < circles.length; i++) {
        //    circles[i].className = circles[i].className.replace(" enable", "");
        //}
        slides[slidePosition - 1].style.display = "block";
        //circles[slidePosition-1].className += " enable";
  
  
      }
  
      function SlideShow() {
        var i;
        var slides = document.getElementsByClassName("Containers");
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        slidePosition++;
        if (slidePosition > slides.length) { slidePosition = 1 }
        slides[slidePosition - 1].style.display = "block";
        //setTimeout(SlideShow, 20000); // Change image every 2 seconds
      }
  
      var slidePosition = 1;
